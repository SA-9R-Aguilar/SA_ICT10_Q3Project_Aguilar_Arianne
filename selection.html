<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- PyScript CSS -->
    <link rel="stylesheet" href="https://pyscript.net/releases/2025.7.3/core.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <script type="module" src="https://pyscript.net/releases/2025.7.3/core.js"></script>
    <title>Regiment Selection</title>

    <style>
        body {
            font-family: Cambria, Cochin, Georgia, Times, 'Times New Roman', serif;
            background-image: url("https://static.wikia.nocookie.net/shingekinokyojin/images/8/86/Military.png/revision/latest/scale-to-width-down/1200?cb=20170823064044");
            background-repeat: no-repeat;
            background-attachment: fixed;
            background-size: cover;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.67);
        }

        h2{
            font-weight: 800;
            font-size: 300%;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.67);
        }

        .btn, .btn-signup {
            width: 100%;
            padding: 10px;
            background-color: #1c734e;
            color: white;
            font-size: 16px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            box-shadow: 0 6px 18px rgba(0,0,0,0.1);
        }
        
        .btn:hover {
            background-color: #105241;
            color:white;
        }

        .form-label{
            font-weight: 600;
            font-size: 18px;
            margin-bottom: 10px;
        }

        .form-check{
            background-color: #111D4A;
            width: 60%;
            border-radius: 5px;
            padding: 10px;
            color: white;
            transform: scale(1);
            transition: transform 0.3s ease;
            box-shadow: 0 6px 18px rgba(0,0,0,0.1);
        }

        .form-check:hover{
            transform: scale(1.02);
            transition: all 0.3s ease-in-out;
        }

        .form-check-input{
            cursor: pointer;
            background-color: #bababa;
        }

        .form-check-input:hover{
            cursor: pointer;
        }

        .mb-3{
            margin-bottom: 25px !important;
        }

        .form-check-label{
            cursor: pointer;
        }

        .card{
            padding: 20px;
            margin-top: 50px;
            margin-bottom: 50px;
            background-color: rgba(27, 24, 1, 0.67);
            color: white;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.67);
        }

        #level {
            background-color: #111D4A;
            padding: 10px;
            border-radius: 10px;
            color: white;
            font-weight: bold;
            transform: scale(1);
            transition: transform 0.3s ease;
            cursor:pointer;
            box-shadow: 0 6px 18px rgba(0,0,0,0.1);
        }

        #level:hover{
            transform: scale(1.0025);
            transition: all 0.3s ease-in-out;
        }


        #section {
            background-color: #111D4A;
            padding: 10px;
            border-radius: 10px;
            color: white;
            font-weight: bold;
            transform: scale(1);
            transition: transform 0.3s ease;
            cursor:pointer;
            box-shadow: 0 6px 18px rgba(0,0,0,0.1);
        }

        #section:hover{
            transform: scale(1.0025);
            transition: all 0.3s ease-in-out;
        }

        .navbar {
                background-color: #1b1801 !important;
                width: 100%;
                border-bottom: 2px solid #1c734e; /* Military green accent line */
                padding: 10px 0;
                box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            }
        .nav-link {
                transition: background-color 0.3s;
                transform: scale(1);
                transition: all 0.3s ease-in-out;
                border-radius: 10px;
            }
        .nav-link:hover {
                color: whitesmoke !important;
                background-color: #105241;
                transform: scale(1.05);
                transition: all 0.3s ease-in-out;
            }
    </style>
</head>
<body class="min-vh-100 d-flex flex-column">
    <!-- Navigation Bar -->
        <nav class="navbar navbar-expand-lg navbar-dark sticky-top">
            <div class="container-fluid">
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav ms-auto">
                        <li class="nav-item"><a class="nav-link" href="index.html">Sign-up</a></li>
                        <li class="nav-item"><a class="nav-link active" href="selection.html">Regiment Selection</a></li>
                        <li class="nav-item"><a class="nav-link" href="members.html">Regiment Members</a></li>
                    </ul>
                </div>
            </div>
        </nav>

    <div class="card p-4">
        <div class="flex-grow-1 d-flex justify-content-center align-items-center">
                <center>
                    <h2 class="text-center">Regiment Selection</h2>
                    <p class="text-center">"Your Heart and Soul to the Cause"</p>
                    <hr>    
                </center>
        </div>
    
        <center>
        <form>
            <div class="mb-3">
                <label class="form-label">Are you done with the account creation?</label><br>
                <div class="form-check form-check-inline">
                    <input class="form-check-input" type="radio" id="registered" name="registration" value="registered">
                    <label class="form-check-label" for="registered">Yes</label>
                </div>
                <div class="form-check form-check-inline">
                    <input class="form-check-input" type="radio" id="notRegistered" name="registration" value="notRegistered">
                    <label class="form-check-label" for="notRegistered">No</label>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">Do you have the medical clearance from the field hospital?</label><br>
                <div class="form-check form-check-inline">
                    <input class="form-check-input" type="radio" id="cleared" name="clearance" value="cleared">
                    <label class="form-check-label" for="cleared">Yes</label>
                </div>
                <div class="form-check form-check-inline">
                    <input class="form-check-input" type="radio" id="notCleared" name="clearance" value="notCleared">
                    <label class="form-check-label" for="notCleared">No</label>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">What's your Grade & Section?</label><br>
                <select id="level" class="form-select mb-2">
                    <option value="7">7</option>
                    <option value="8">8</option>
                    <option value="9">9</option>
                    <option value="10">10</option>
                </select>
                <select id="section" class="form-select">
                    <option value='emerald'>Emerald</option>
                    <option value='ruby'>Ruby</option>
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label">Academic Average Score?</label>
                    <input id="average" type="text" class="form-control text-center" style="width:500px;" placeholder="Please Enter Average Grade Computed From Account Creation">
                    <div id="eligible" class="mt-3"></div>
            </div>

            <div class="d-grid">
                <input type="button" py-click="regiment_checker" value="Show My Assigned Regiment" class="btn btn-signup">
            </div>
            <br>
        </form>
        <center>
        <div id="output" class="mt-3"></div>
        <div id="image" class="mt-3"></div>
        <div id="leader" class="mt-3"></div>
        <hr>
        <p>Please proceed to the Regiment Members page after getting your regiment assignment</p>
        </center>
    </div>
    </center>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script type="py" src="main2.py"></script>
</body>
</html>
